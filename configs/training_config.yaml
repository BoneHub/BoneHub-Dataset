training:
  num_epochs: 100
  batch_size: 2
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  optimizer: adamw
  loss: dice
  scheduler: cosine
  warmup_epochs: 5
  early_stopping_patience: 20

data:
  spacing: [1.0, 1.0, 1.0]
  intensity_min: -200
  intensity_max: 200
  crop_margin: 10
  cache_dir: ./cache
  use_persistent_cache: false

model:
  type: unet
  in_channels: 1
  out_channels: 2
  channels: [16, 32, 64, 128, 256]
  strides: [2, 2, 2, 2]
  num_res_units: 2
  dropout: 0.2

validation:
  val_split: 0.2
  metrics:
    - dice
    - iou
    - hausdorff
